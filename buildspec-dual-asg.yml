version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo Installing dependencies
      - npm install

  build:
    commands:
      - echo Build started
      - npm run build

artifacts:
  files:
    - appspec.yml
    - code-deploy-scripts/**/*
    - package.json
    - package-lock.json
    - app/**/*
    - network_agent/**/*
  discard-paths: no
